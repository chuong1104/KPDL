# docker-compose.yml
# Đặt ở thư mục gốc dự án (cùng cấp với .env)
services:

  # ── MinIO Data Lake ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: electronics-minio
    ports:
      - '9000:9000'      # S3 API — PySpark kết nối vào đây
      - '9001:9001'      # Web Console — mở browser localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data  # Data persistent ngay cả khi container restart
    command: server /data --console-address ':9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
# ── MinIO Init (chạy 1 lần để tạo buckets) ──────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: electronics-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/electronics-bronze;
      mc mb --ignore-existing local/electronics-silver;
      mc mb --ignore-existing local/electronics-gold;
      echo 'Buckets created successfully';
      "
    restart: 'no'   # Chỉ chạy 1 lần khi compose up
# ── Spark Master ─────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.1
    container_name: electronics-spark-master
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SECURE: ${MINIO_SECURE}
      SPARK_MASTER: spark://spark-master:7077
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY}
      SPARK_EXECUTOR_MEMORY: ${SPARK_EXECUTOR_MEMORY}
      SPARK_SHUFFLE_PARTITIONS: ${SPARK_SHUFFLE_PARTITIONS}
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./notebooks:/opt/spark/notebooks
      - ./src:/opt/spark/src
    restart: unless-stopped
# ── Spark Worker ─────────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.1
    container_name: electronics-spark-worker
    environment:
      SPARK_MASTER_URL: spark://spark-master:7077
    ports:
      - "8081:8081"
    volumes:
      - ./notebooks:/opt/spark/notebooks
      - ./src:/opt/spark/src
    depends_on:
      - spark-master
    restart: unless-stopped
# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  minio_data:
    driver: local   # Data lưu trong Docker volume — persistent qua restart
