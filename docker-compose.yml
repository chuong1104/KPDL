services:
  minio:
    image: minio/minio:latest
    container_name: electronics-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'
    healthcheck:
      test: ["CMD", "mc", "alias", "set", "local", "http://minio:9000", "${MINIO_ROOT_USER}", "${MINIO_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: electronics-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/electronics-bronze &&
      mc mb --ignore-existing local/electronics-silver &&
      mc mb --ignore-existing local/electronics-gold &&
      echo 'Buckets created successfully'
      "
    restart: 'no'

  spark-master:
    image: apache/spark:3.5.1
    container_name: electronics-spark-master
    user: root
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_DRIVER_MEMORY=${SPARK_DRIVER_MEMORY}
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./notebooks:/opt/spark/notebooks
      - ./src:/opt/spark/src
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.1
    container_name: electronics-spark-worker
    user: root
    environment:
      - SPARK_EXECUTOR_MEMORY=${SPARK_EXECUTOR_MEMORY}
    ports:
      - "8081:8081"
    volumes:
      - ./notebooks:/opt/spark/notebooks
      - ./src:/opt/spark/src
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    restart: unless-stopped

  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: electronics-jupyter
    build: 
      context: .
      dockerfile: Dockerfile.jupyter
  
    user: root
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      SPARK_MASTER_URL: spark://spark-master:7077
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./src:/home/jovyan/work/src
    depends_on:
      - spark-master
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''

volumes:
  minio_data:
    driver: local